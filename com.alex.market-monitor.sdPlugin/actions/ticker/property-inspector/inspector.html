<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ticker Settings</title>
  <style>
    :root {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1e1e1e;
    }

    body { margin: 0; padding: 12px 14px; }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 4px;
      color: #909090;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 13px;
    }

    input[type="text"] { text-transform: uppercase; letter-spacing: 0.08em; }

    .hint { margin-top: 4px; color: #6b7280; font-size: 11px; }
  </style>
</head>
<body>

  <div class="field">
    <label>Ticker Symbol</label>
    <input type="text" id="symbol" placeholder="e.g. AAPL" maxlength="10"/>
    <p class="hint">Any symbol supported by Yahoo Finance (stocks, ETFs, crypto).</p>
  </div>

  <div class="field">
    <label>Refresh Interval (minutes)</label>
    <input type="number" id="pollInterval" min="1" max="60" value="15"/>
  </div>

  <script src="inspector.js"></script>
</body>
</html>
